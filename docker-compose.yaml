version: '3.8'
services:
  attest-ai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_AI_API_KEY=${SECRET_AI_API_KEY}
      - ARWEAVE_MNEMONIC=${ARWEAVE_MNEMONIC}
      - ARWEAVE_GATEWAY=${ARWEAVE_GATEWAY}
      - API_PORT=${API_PORT}
      - DEBUG=${DEBUG}
    restart: unless-stopped