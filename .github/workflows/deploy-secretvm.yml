name: Deploy to SecretVM

on:
  # Automatic deployment on main branch push
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
  
  # Manual deployment with parameters
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      validation_level:
        description: 'Validation Level'
        required: true
        default: 'comprehensive'
        type: choice
        options:
          - quick
          - comprehensive
          - extended
      force_deploy:
        description: 'Force deployment (skip some checks)'
        required: false
        type: boolean
        default: false
      deploy_monitoring:
        description: 'Deploy monitoring tools'
        required: false
        type: boolean
        default: true

  # Pull request validation (no deployment)
  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  DOCKER_BUILDKIT: 1
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Job 1: Build and Validation
  build-and-validate:
    name: Build & Validate
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.deploy_decision.outputs.should_deploy }}
      deployment_env: ${{ steps.deploy_decision.outputs.deployment_env }}
      validation_level: ${{ steps.deploy_decision.outputs.validation_level }}
      docker_image: ${{ steps.build.outputs.image }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # Install dependencies with error handling
          echo "Installing core dependencies..."
          pip install fastapi==0.104.1
          pip install 'uvicorn[standard]==0.24.0'
          pip install python-dotenv==1.0.0
          pip install httpx==0.25.2
          pip install pydantic==2.5.2
          pip install pydantic-settings==2.1.0
          pip install requests==2.31.0
          pip install cachetools==5.3.2
          pip install python-multipart==0.0.6
          pip install aiofiles==23.2.1
          pip install jinja2==3.1.2
          pip install psutil==5.9.6
          
          # Install testing dependencies
          pip install pytest==7.4.3
          pip install pytest-asyncio==0.21.1
          
          echo "✅ All dependencies installed successfully"

      - name: Code Quality Checks
        run: |
          echo "🔍 Running code quality checks..."
          
          # Check for secrets in code
          if grep -r -i "secret\|password\|key\|token" src/ --include="*.py" | grep -v "SECRET_AI" | grep -v "# " | grep -v "settings\." | head -5; then
            echo "❌ Potential hardcoded secrets found"
            exit 1
          fi
          
          # Basic Python syntax check
          python -m py_compile src/main.py
          python -m py_compile src/config/settings.py
          
          echo "✅ Code quality checks passed"

      - name: Security Scan
        run: |
          echo "🔒 Running security scan..."
          
          # Check for common security issues
          if grep -r "eval\|exec\|subprocess\.call" src/ --include="*.py"; then
            echo "⚠️  Potential security issues found"
          fi
          
          # Check file permissions
          find . -name "*.py" -perm /111 | grep -v __pycache__ || true
          
          echo "✅ Security scan completed"

      - name: Build Docker Image
        id: build
        run: |
          echo "🏗️ Building Docker image..."
          
          # Build image with cache
          docker build \
            --cache-from attest_ai:latest \
            --tag attest_ai:${{ github.sha }} \
            --tag attest_ai:latest \
            .
          
          # Test image can start
          docker run --rm -d --name test_container \
            -e SECRET_AI_API_KEY="test_key" \
            -e ARWEAVE_WALLET_JWK='{"kty":"RSA","e":"AQAB","n":"test"}' \
            attest_ai:${{ github.sha }} &
          
          # Wait for container to start
          sleep 10
          
          # Stop test container
          docker stop test_container || true
          
          echo "image=attest_ai:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "✅ Docker image built successfully"

      - name: Configuration Validation
        run: |
          echo "⚙️ Validating configuration..."
          
          # Test configuration loading
          python -c "
          import os
          os.environ['SECRET_AI_API_KEY'] = 'test_key'
          os.environ['ARWEAVE_WALLET_JWK'] = '{\"kty\":\"RSA\",\"e\":\"AQAB\",\"n\":\"test\"}'
          from src.config import get_settings
          settings = get_settings()
          print(f'Configuration loaded successfully')
          print(f'App host: {settings.APP_HOST}')
          print(f'App port: {settings.APP_PORT}')
          "
          
          echo "✅ Configuration validation passed"

      - name: Unit Tests
        run: |
          echo "🧪 Running unit tests..."
          
          # Set test environment variables
          export SECRET_AI_API_KEY="test_key_for_unit_tests"
          export ARWEAVE_WALLET_JWK='{"kty":"RSA","e":"AQAB","n":"test_value"}'
          export APP_DEBUG=true
          
          # Run basic import tests
          python -c "
          from src.config import get_settings
          from src.attestation import SelfAttestationClient
          from src.chat import SecretAIClient
          from src.arweave import ArweaveClient
          from src.utils.environment import EnvironmentDetector
          print('✅ All imports successful')
          "
          
          echo "✅ Unit tests passed"

      - name: Deployment Decision
        id: deploy_decision
        run: |
          echo "🎯 Making deployment decision..."
          
          # Determine if we should deploy
          SHOULD_DEPLOY="false"
          DEPLOYMENT_ENV="staging"
          VALIDATION_LEVEL="comprehensive"
          
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            SHOULD_DEPLOY="true"
            DEPLOYMENT_ENV="${{ github.event.inputs.environment }}"
            VALIDATION_LEVEL="${{ github.event.inputs.validation_level }}"
            echo "📋 Manual deployment requested: $DEPLOYMENT_ENV"
          elif [[ "${{ github.event_name }}" == "push" && "${{ github.ref }}" == "refs/heads/main" ]]; then
            SHOULD_DEPLOY="true"
            DEPLOYMENT_ENV="staging"
            echo "🚀 Automatic deployment to staging triggered"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SHOULD_DEPLOY="false"
            echo "🔍 Pull request validation only"
          fi
          
          echo "should_deploy=$SHOULD_DEPLOY" >> $GITHUB_OUTPUT
          echo "deployment_env=$DEPLOYMENT_ENV" >> $GITHUB_OUTPUT
          echo "validation_level=$VALIDATION_LEVEL" >> $GITHUB_OUTPUT
          
          echo "Decision: Deploy=$SHOULD_DEPLOY, Environment=$DEPLOYMENT_ENV, Validation=$VALIDATION_LEVEL"

  # Job 2: SecretVM Deployment
  deploy-secretvm:
    name: Deploy to SecretVM
    runs-on: ubuntu-latest
    needs: build-and-validate
    if: needs.build-and-validate.outputs.should_deploy == 'true'
    
    environment: 
      name: ${{ needs.build-and-validate.outputs.deployment_env }}
      
    outputs:
      vm_id: ${{ steps.deploy.outputs.vm_id }}
      vm_url: ${{ steps.deploy.outputs.vm_url }}
      deployment_status: ${{ steps.deploy.outputs.status }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic psutil requests

      - name: Install SecretVM CLI
        run: |
          echo "📦 Installing SecretVM CLI..."
          
          # Download and install secretvm-cli
          curl -sSL https://get.scrt.network/secretvm-cli | bash
          
          # Add to PATH
          export PATH="$HOME/.secretvm/bin:$PATH"
          echo "$HOME/.secretvm/bin" >> $GITHUB_PATH
          
          # Verify installation
          secretvm-cli --version
          
          echo "✅ SecretVM CLI installed"

      - name: Setup SecretVM Authentication
        run: |
          echo "🔐 Setting up SecretVM authentication..."
          
          # Authenticate with SecretVM
          secretvm-cli auth login -w "${{ secrets.SECRETVM_WALLET_ADDRESS }}"
          
          # Verify authentication
          if secretvm-cli auth status; then
            echo "✅ SecretVM authentication successful"
          else
            echo "❌ SecretVM authentication failed"
            exit 1
          fi

      - name: Prepare Production Environment
        run: |
          echo "⚙️ Preparing production environment configuration..."
          
          # Create production environment file
          cat > .env.production << EOF
          # Production Environment Configuration
          SECRET_AI_API_KEY=${{ secrets.SECRET_AI_API_KEY }}
          ARWEAVE_WALLET_JWK=${{ secrets.ARWEAVE_WALLET_JWK }}
          
          # Deployment Configuration
          DEPLOYMENT_ENVIRONMENT=production
          SECRETVM_DEPLOYMENT=true
          APP_DEBUG=false
          LOG_LEVEL=WARNING
          
          # Application Configuration
          APP_HOST=0.0.0.0
          APP_PORT=8000
          
          # Cache Configuration
          CACHE_TTL_SECONDS=300
          SECRET_AI_DISCOVERY_CACHE_TTL=3600
          
          # Arweave Configuration
          ARWEAVE_GATEWAY=https://arweave.net
          ENABLE_ARWEAVE_UPLOAD=true
          MOCK_UNFUNDED_TRANSACTIONS=true
          
          # SecretVM Optimization
          MAX_MEMORY_MB=1024
          MAX_CPU_PERCENT=80
          HEALTH_CHECK_INTERVAL=30
          HEALTH_CHECK_TIMEOUT=10
          HEALTH_CHECK_RETRIES=3
          
          # Security Configuration
          CORS_ORIGINS=*
          RATE_LIMIT_PER_MINUTE=100
          ENABLE_SECURITY_HEADERS=true
          EOF
          
          echo "✅ Production environment configured"

      - name: Pre-Deployment Validation
        run: |
          echo "🔍 Running pre-deployment validation..."
          
          # Validate environment configuration
          python -c "
          import os
          # Load environment from file
          with open('.env.production') as f:
              for line in f:
                  if '=' in line and not line.strip().startswith('#'):
                      key, value = line.strip().split('=', 1)
                      os.environ[key] = value
          
          from src.config import get_settings
          settings = get_settings()
          print(f'✅ Environment validation passed')
          print(f'Environment: {settings.DEPLOYMENT_ENVIRONMENT}')
          print(f'SecretVM deployment: {settings.SECRETVM_DEPLOYMENT}')
          "
          
          # Check required secrets
          if [[ -z "${{ secrets.SECRET_AI_API_KEY }}" ]]; then
            echo "❌ SECRET_AI_API_KEY not configured"
            exit 1
          fi
          
          if [[ -z "${{ secrets.ARWEAVE_WALLET_JWK }}" ]]; then
            echo "❌ ARWEAVE_WALLET_JWK not configured"
            exit 1
          fi
          
          echo "✅ Pre-deployment validation passed"

      - name: Deploy to SecretVM
        id: deploy
        run: |
          echo "🚀 Deploying to SecretVM..."
          
          # Set deployment variables
          VM_NAME="attest-ai-${{ needs.build-and-validate.outputs.deployment_env }}-${{ github.run_number }}"
          
          # Make deployment script executable
          chmod +x scripts/deploy_secretvm.sh
          
          # Set environment variables for deployment
          export VM_NAME="$VM_NAME"
          export VM_TYPE="medium"
          export ENV_FILE=".env.production"
          
          # Run deployment script
          if ./scripts/deploy_secretvm.sh; then
            echo "✅ Deployment successful"
            
            # Extract VM information
            VM_ID=$(cat .vm_id 2>/dev/null || echo "unknown")
            VM_URL=$(cat .vm_url 2>/dev/null || echo "unknown")
            
            echo "vm_id=$VM_ID" >> $GITHUB_OUTPUT
            echo "vm_url=$VM_URL" >> $GITHUB_OUTPUT
            echo "status=success" >> $GITHUB_OUTPUT
            
            echo "VM ID: $VM_ID"
            echo "VM URL: $VM_URL"
            
          else
            echo "❌ Deployment failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Store Deployment Info
        run: |
          echo "📝 Storing deployment information..."
          
          # Create deployment artifact
          cat > deployment-info.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "environment": "${{ needs.build-and-validate.outputs.deployment_env }}",
            "vm_id": "${{ steps.deploy.outputs.vm_id }}",
            "vm_url": "${{ steps.deploy.outputs.vm_url }}",
            "github_sha": "${{ github.sha }}",
            "github_run_id": "${{ github.run_id }}",
            "deployed_by": "${{ github.actor }}"
          }
          EOF
          
          echo "✅ Deployment info stored"

      - name: Upload Deployment Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: deployment-info-${{ github.run_id }}
          path: |
            deployment-info.json
            .vm_id
            .vm_url

  # Job 3: Post-Deployment Validation
  validate-deployment:
    name: Validate Deployment
    runs-on: ubuntu-latest
    needs: [build-and-validate, deploy-secretvm]
    if: needs.deploy-secretvm.outputs.deployment_status == 'success'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx asyncio pydantic psutil

      - name: Basic Health Check
        run: |
          echo "🏥 Running basic health check..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Wait for application to be ready
          echo "Waiting for application to be ready..."
          for i in {1..30}; do
            if curl -f -s "${VM_URL}:8000/health" > /dev/null; then
              echo "✅ Application is responding"
              break
            fi
            echo "Attempt $i/30: Application not ready, waiting..."
            sleep 10
          done
          
          # Get health status
          HEALTH_RESPONSE=$(curl -s "${VM_URL}:8000/health")
          echo "Health Response: $HEALTH_RESPONSE"
          
          # Check health status
          STATUS=$(echo "$HEALTH_RESPONSE" | jq -r '.status')
          if [[ "$STATUS" == "healthy" ]]; then
            echo "✅ Health check passed"
          else
            echo "❌ Health check failed: $STATUS"
            exit 1
          fi

      - name: SecretVM Environment Validation
        run: |
          echo "🔍 Validating SecretVM environment..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Run SecretVM-specific validation
          export SECRETVM_URL="$VM_URL"
          python3 scripts/test_secretvm_deployment.py
          
          echo "✅ SecretVM environment validation completed"

      - name: Comprehensive Health Validation
        if: needs.build-and-validate.outputs.validation_level == 'comprehensive' || needs.build-and-validate.outputs.validation_level == 'extended'
        run: |
          echo "🧪 Running comprehensive health validation..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Run health validator
          export SECRETVM_URL="$VM_URL"
          python3 scripts/health_validator.py --strict --save-results validation_results.json
          
          echo "✅ Comprehensive health validation completed"

      - name: Extended Test Suite
        if: needs.build-and-validate.outputs.validation_level == 'extended'
        run: |
          echo "🚀 Running extended test suite..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Run post-deployment test suite with extended tests
          export SECRETVM_URL="$VM_URL"
          python3 scripts/post_deployment_test_suite.py --extended --save-results test_results.json
          
          echo "✅ Extended test suite completed"

      - name: Performance Baseline
        run: |
          echo "📊 Establishing performance baseline..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Test key endpoints for performance
          echo "Testing endpoint performance..."
          
          # Health endpoint
          HEALTH_TIME=$(curl -w "%{time_total}" -s "${VM_URL}:8000/health" -o /dev/null)
          echo "Health endpoint: ${HEALTH_TIME}s"
          
          # Self-attestation endpoint
          ATTEST_TIME=$(curl -w "%{time_total}" -s "${VM_URL}:8000/api/attestation/self" -o /dev/null)
          echo "Self-attestation endpoint: ${ATTEST_TIME}s"
          
          # Create performance report
          cat > performance_baseline.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "vm_url": "$VM_URL",
            "metrics": {
              "health_response_time": $HEALTH_TIME,
              "attestation_response_time": $ATTEST_TIME
            }
          }
          EOF
          
          echo "✅ Performance baseline established"

      - name: Upload Validation Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: validation-results-${{ github.run_id }}
          path: |
            validation_results.json
            test_results.json
            performance_baseline.json

  # Job 4: Monitoring Integration
  setup-monitoring:
    name: Setup Monitoring
    runs-on: ubuntu-latest
    needs: [build-and-validate, deploy-secretvm, validate-deployment]
    if: needs.deploy-secretvm.outputs.deployment_status == 'success' && (github.event.inputs.deploy_monitoring == 'true' || github.event.inputs.deploy_monitoring == '')
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx asyncio pydantic psutil

      - name: Setup Continuous Monitoring
        run: |
          echo "📊 Setting up continuous monitoring..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          
          # Test monitoring endpoints
          echo "Testing monitoring endpoints..."
          
          # Environment info
          curl -s "${VM_URL}:8000/api/environment/info" | jq
          
          # Resource usage
          curl -s "${VM_URL}:8000/api/environment/resources" | jq
          
          # Detailed health
          curl -s "${VM_URL}:8000/api/environment/health/detailed" | jq
          
          echo "✅ Monitoring endpoints verified"

      - name: Create Monitoring Dashboard
        run: |
          echo "📋 Creating monitoring dashboard..."
          
          VM_URL="${{ needs.deploy-secretvm.outputs.vm_url }}"
          VM_ID="${{ needs.deploy-secretvm.outputs.vm_id }}"
          
          # Create monitoring configuration
          cat > monitoring_config.json << EOF
          {
            "deployment": {
              "vm_id": "$VM_ID",
              "vm_url": "$VM_URL",
              "environment": "${{ needs.build-and-validate.outputs.deployment_env }}",
              "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
              "github_sha": "${{ github.sha }}"
            },
            "monitoring": {
              "health_endpoint": "${VM_URL}:8000/health",
              "environment_info": "${VM_URL}:8000/api/environment/info",
              "resource_usage": "${VM_URL}:8000/api/environment/resources",
              "detailed_health": "${VM_URL}:8000/api/environment/health/detailed"
            },
            "management": {
              "vm_status": "secretvm-cli vm status $VM_ID",
              "vm_logs": "secretvm-cli vm logs $VM_ID",
              "vm_restart": "secretvm-cli vm restart $VM_ID"
            }
          }
          EOF
          
          echo "✅ Monitoring dashboard created"

      - name: Upload Monitoring Config
        uses: actions/upload-artifact@v3
        with:
          name: monitoring-config-${{ github.run_id }}
          path: monitoring_config.json

  # Job 5: Deployment Summary
  deployment-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-and-validate, deploy-secretvm, validate-deployment, setup-monitoring]
    if: always()
    
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts

      - name: Generate Deployment Summary
        run: |
          echo "📋 Generating deployment summary..."
          
          # Create comprehensive deployment summary
          cat > deployment_summary.md << 'EOF'
          # Deployment Summary
          
          ## Deployment Information
          - **Environment**: ${{ needs.build-and-validate.outputs.deployment_env }}
          - **GitHub SHA**: ${{ github.sha }}
          - **Deployed By**: ${{ github.actor }}
          - **Deployment Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Validation Level**: ${{ needs.build-and-validate.outputs.validation_level }}
          
          ## Deployment Status
          - **Build & Validation**: ✅ Success
          - **SecretVM Deployment**: ${{ needs.deploy-secretvm.outputs.deployment_status == 'success' && '✅ Success' || '❌ Failed' }}
          - **Post-Deployment Validation**: ${{ needs.validate-deployment.result == 'success' && '✅ Success' || '❌ Failed' }}
          - **Monitoring Setup**: ${{ needs.setup-monitoring.result == 'success' && '✅ Success' || '❌ Failed' }}
          
          ## VM Information
          - **VM ID**: ${{ needs.deploy-secretvm.outputs.vm_id }}
          - **VM URL**: ${{ needs.deploy-secretvm.outputs.vm_url }}
          - **Application URL**: ${{ needs.deploy-secretvm.outputs.vm_url }}:8000
          
          ## Quick Access Links
          - [Health Check](${{ needs.deploy-secretvm.outputs.vm_url }}:8000/health)
          - [Environment Info](${{ needs.deploy-secretvm.outputs.vm_url }}:8000/api/environment/info)
          - [Resource Usage](${{ needs.deploy-secretvm.outputs.vm_url }}:8000/api/environment/resources)
          
          ## Management Commands
          ```bash
          # Check VM status
          secretvm-cli vm status ${{ needs.deploy-secretvm.outputs.vm_id }}
          
          # View logs
          secretvm-cli vm logs ${{ needs.deploy-secretvm.outputs.vm_id }}
          
          # Monitor deployment
          python3 scripts/monitor_secretvm_deployment.py --vm-url ${{ needs.deploy-secretvm.outputs.vm_url }}
          ```
          
          ## Next Steps
          1. Verify application functionality at [${{ needs.deploy-secretvm.outputs.vm_url }}:8000](${{ needs.deploy-secretvm.outputs.vm_url }}:8000)
          2. Monitor deployment health and performance
          3. Review validation results in artifacts
          4. Set up ongoing monitoring and alerting
          EOF
          
          echo "✅ Deployment summary generated"

      - name: Upload Summary
        uses: actions/upload-artifact@v3
        with:
          name: deployment-summary-${{ github.run_id }}
          path: deployment_summary.md

      - name: Post Deployment Status
        if: always()
        run: |
          echo "🎯 Final Deployment Status:"
          echo "Build & Validation: ${{ needs.build-and-validate.result }}"
          echo "SecretVM Deployment: ${{ needs.deploy-secretvm.result }}"
          echo "Validation: ${{ needs.validate-deployment.result }}"
          echo "Monitoring: ${{ needs.setup-monitoring.result }}"
          
          if [[ "${{ needs.deploy-secretvm.result }}" == "success" && "${{ needs.validate-deployment.result }}" == "success" ]]; then
            echo "🎉 DEPLOYMENT SUCCESSFUL!"
            echo "Application URL: ${{ needs.deploy-secretvm.outputs.vm_url }}:8000"
          else
            echo "❌ DEPLOYMENT FAILED - Check job logs for details"
            exit 1
          fi