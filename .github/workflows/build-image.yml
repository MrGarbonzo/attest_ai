name: Build and Push Docker Image

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Debug registry info
      run: |
        echo "Registry: ${{ env.REGISTRY }}"
        echo "Actor: ${{ github.actor }}"
        echo "Repository: ${{ github.repository }}"
        echo "Token permissions: ${{ github.token && 'Token available' || 'No token' }}"

    # CRITICAL: Convert repository name to lowercase
    - name: Set lowercase repository name
      run: |
        echo "Original repo: ${{ github.repository }}"
        REPO_LOWER=$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')
        echo "Lowercase repo: $REPO_LOWER"
        echo "REPO_LOWER=$REPO_LOWER" >> $GITHUB_ENV

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ${{ env.REGISTRY }}/${{ env.REPO_LOWER }}
          ${{ env.REGISTRY }}/${{ github.repository_owner }}/attest_ai
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build Docker image (test only)
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/attest_ai.tar
        
    - name: Test Docker image
      run: |
        docker load -i /tmp/attest_ai.tar
        echo "Docker image built successfully!"
        docker images | grep attest_ai || echo "Image loaded"
        
    # Uncomment below when GHCR permissions are resolved
    # - name: Push to GitHub Container Registry
    #   uses: docker/build-push-action@v5
    #   with:
    #     context: .
    #     push: true
    #     tags: ${{ steps.meta.outputs.tags }}
    #     labels: ${{ steps.meta.outputs.labels }}
    #     cache-from: type=gha

    - name: Image digest
      run: echo ${{ steps.meta.outputs.digest }}
      
    - name: Workflow complete
      run: echo "Docker image build and push completed successfully"