name: Validate Dependencies

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'requirements.txt'
      - 'src/**'

jobs:
  validate-deps:
    name: Validate Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Create Virtual Environment
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade pip

      - name: Install Core Dependencies
        run: |
          source venv/bin/activate
          
          # Install dependencies one by one to identify issues
          echo "Installing FastAPI..."
          pip install fastapi==0.104.1
          
          echo "Installing Uvicorn..."
          pip install 'uvicorn[standard]==0.24.0'
          
          echo "Installing other core deps..."
          pip install python-dotenv==1.0.0
          pip install httpx==0.25.2
          pip install pydantic==2.5.2
          pip install pydantic-settings==2.1.0
          pip install requests==2.31.0
          pip install cachetools==5.3.2
          pip install python-multipart==0.0.6
          pip install aiofiles==23.2.1
          pip install jinja2==3.1.2
          pip install psutil==5.9.6

      - name: Install Dev Dependencies
        run: |
          source venv/bin/activate
          pip install pytest==7.4.3
          pip install pytest-asyncio==0.21.1

      - name: Test Imports
        run: |
          source venv/bin/activate
          python -c "
          import fastapi
          import uvicorn
          import httpx
          import pydantic
          import pydantic_settings
          import requests
          import cachetools
          import psutil
          print('✅ All core imports successful')
          "

      - name: Test Application Imports
        run: |
          source venv/bin/activate
          
          # Set minimal environment variables
          export SECRET_AI_API_KEY="test_key"
          export ARWEAVE_WALLET_JWK='{"kty":"RSA","e":"AQAB","n":"test","d":"test_private"}'
          export APP_DEBUG=true
          
          python -c "
          from src.config import get_settings
          print('✅ Config import successful')
          
          from src.attestation import SelfAttestationClient
          print('✅ Attestation import successful')
          
          from src.chat import SecretAIClient  
          print('✅ Chat import successful')
          
          from src.arweave import ArweaveClient
          print('✅ Arweave import successful')
          
          from src.utils.environment import EnvironmentDetector
          print('✅ Environment import successful')
          
          from src.main import app
          print('✅ Main app import successful')
          "

      - name: Test Configuration Loading
        run: |
          source venv/bin/activate
          
          # Test with valid configuration
          export SECRET_AI_API_KEY="test_key_12345"
          export ARWEAVE_WALLET_JWK='{"kty":"RSA","e":"AQAB","n":"test_value","d":"test_private"}'
          export APP_DEBUG=true
          
          python -c "
          from src.config import get_settings
          settings = get_settings()
          print(f'✅ Settings loaded: {settings.APP_HOST}:{settings.APP_PORT}')
          print(f'✅ Debug mode: {settings.APP_DEBUG}')
          print(f'✅ Environment info: {settings.get_environment_info()}')
          "

      - name: Generate Dependency Report
        if: always()
        run: |
          source venv/bin/activate
          echo "# Dependency Validation Report" > dependency_report.md
          echo "Generated: $(date)" >> dependency_report.md
          echo "" >> dependency_report.md
          echo "## Installed Packages" >> dependency_report.md
          pip list >> dependency_report.md
          echo "" >> dependency_report.md
          echo "## Python Version" >> dependency_report.md
          python --version >> dependency_report.md

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-report
          path: dependency_report.md