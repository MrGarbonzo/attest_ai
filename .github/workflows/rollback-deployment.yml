name: Rollback SecretVM Deployment

on:
  workflow_dispatch:
    inputs:
      vm_id:
        description: 'VM ID to rollback'
        required: true
        type: string
      previous_vm_id:
        description: 'Previous VM ID to restore (optional)'
        required: false
        type: string
      rollback_reason:
        description: 'Reason for rollback'
        required: true
        type: choice
        options:
          - 'Health check failure'
          - 'Performance issues'
          - 'Security concern'
          - 'Application error'
          - 'Manual request'
          - 'Other'
      cleanup_failed_vm:
        description: 'Delete failed VM after rollback'
        required: false
        type: boolean
        default: true
      notification_channel:
        description: 'Notification method'
        required: false
        type: choice
        options:
          - 'github-only'
          - 'slack'
          - 'email'
        default: 'github-only'

env:
  PYTHON_VERSION: '3.11'

jobs:
  # Job 1: Validate Rollback Request
  validate-rollback:
    name: Validate Rollback Request
    runs-on: ubuntu-latest
    outputs:
      can_rollback: ${{ steps.validation.outputs.can_rollback }}
      vm_status: ${{ steps.validation.outputs.vm_status }}
      previous_vm_available: ${{ steps.validation.outputs.previous_vm_available }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install SecretVM CLI
        run: |
          echo "📦 Installing SecretVM CLI..."
          curl -sSL https://get.scrt.network/secretvm-cli | bash
          export PATH="$HOME/.secretvm/bin:$PATH"
          echo "$HOME/.secretvm/bin" >> $GITHUB_PATH
          secretvm-cli --version

      - name: Setup SecretVM Authentication
        run: |
          echo "🔐 Setting up SecretVM authentication..."
          secretvm-cli auth login -w "${{ secrets.SECRETVM_WALLET_ADDRESS }}"
          secretvm-cli auth status

      - name: Validate Rollback Request
        id: validation
        run: |
          echo "🔍 Validating rollback request..."
          
          VM_ID="${{ github.event.inputs.vm_id }}"
          PREVIOUS_VM_ID="${{ github.event.inputs.previous_vm_id }}"
          
          # Check current VM status
          echo "Checking VM status: $VM_ID"
          if VM_STATUS=$(secretvm-cli vm status "$VM_ID" --format json 2>/dev/null); then
            VM_STATE=$(echo "$VM_STATUS" | jq -r '.status')
            echo "Current VM status: $VM_STATE"
            echo "vm_status=$VM_STATE" >> $GITHUB_OUTPUT
            
            if [[ "$VM_STATE" == "running" || "$VM_STATE" == "failed" || "$VM_STATE" == "error" ]]; then
              echo "can_rollback=true" >> $GITHUB_OUTPUT
            else
              echo "can_rollback=false" >> $GITHUB_OUTPUT
              echo "❌ VM is in state '$VM_STATE' and cannot be rolled back"
              exit 1
            fi
          else
            echo "❌ VM $VM_ID not found or inaccessible"
            echo "can_rollback=false" >> $GITHUB_OUTPUT
            exit 1
          fi
          
          # Check previous VM if specified
          PREVIOUS_VM_AVAILABLE="false"
          if [[ -n "$PREVIOUS_VM_ID" ]]; then
            echo "Checking previous VM: $PREVIOUS_VM_ID"
            if PREV_STATUS=$(secretvm-cli vm status "$PREVIOUS_VM_ID" --format json 2>/dev/null); then
              PREV_STATE=$(echo "$PREV_STATUS" | jq -r '.status')
              echo "Previous VM status: $PREV_STATE"
              
              if [[ "$PREV_STATE" == "stopped" || "$PREV_STATE" == "running" ]]; then
                PREVIOUS_VM_AVAILABLE="true"
                echo "✅ Previous VM is available for restore"
              else
                echo "⚠️ Previous VM is in state '$PREV_STATE'"
              fi
            else
              echo "⚠️ Previous VM $PREVIOUS_VM_ID not found"
            fi
          fi
          
          echo "previous_vm_available=$PREVIOUS_VM_AVAILABLE" >> $GITHUB_OUTPUT
          
          echo "✅ Rollback validation completed"

  # Job 2: Emergency Rollback
  emergency-rollback:
    name: Emergency Rollback
    runs-on: ubuntu-latest
    needs: validate-rollback
    if: needs.validate-rollback.outputs.can_rollback == 'true'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic psutil requests

      - name: Install SecretVM CLI
        run: |
          curl -sSL https://get.scrt.network/secretvm-cli | bash
          export PATH="$HOME/.secretvm/bin:$PATH"
          echo "$HOME/.secretvm/bin" >> $GITHUB_PATH

      - name: Setup SecretVM Authentication
        run: |
          secretvm-cli auth login -w "${{ secrets.SECRETVM_WALLET_ADDRESS }}"
          secretvm-cli auth status

      - name: Capture Pre-Rollback State
        run: |
          echo "📸 Capturing pre-rollback state..."
          
          VM_ID="${{ github.event.inputs.vm_id }}"
          
          # Get VM information
          secretvm-cli vm status "$VM_ID" --format json > pre_rollback_vm_status.json 2>/dev/null || echo "{}" > pre_rollback_vm_status.json
          
          # Try to get application logs
          secretvm-cli vm logs "$VM_ID" --tail 100 > pre_rollback_logs.txt 2>/dev/null || echo "No logs available" > pre_rollback_logs.txt
          
          # Try to get application health if accessible
          VM_STATUS=$(cat pre_rollback_vm_status.json)
          VM_URL=$(echo "$VM_STATUS" | jq -r '.url // "unknown"')
          
          if [[ "$VM_URL" != "unknown" && "$VM_URL" != "null" ]]; then
            echo "Attempting to capture application health..."
            curl -m 10 -s "${VM_URL}:8000/health" > pre_rollback_health.json 2>/dev/null || echo "{\"error\": \"health check failed\"}" > pre_rollback_health.json
            curl -m 10 -s "${VM_URL}:8000/api/environment/resources" > pre_rollback_resources.json 2>/dev/null || echo "{\"error\": \"resource check failed\"}" > pre_rollback_resources.json
          else
            echo "{\"error\": \"VM URL not available\"}" > pre_rollback_health.json
            echo "{\"error\": \"VM URL not available\"}" > pre_rollback_resources.json
          fi
          
          echo "✅ Pre-rollback state captured"

      - name: Stop Failed VM
        run: |
          echo "🛑 Stopping failed VM..."
          
          VM_ID="${{ github.event.inputs.vm_id }}"
          
          # Stop the VM
          if secretvm-cli vm stop "$VM_ID"; then
            echo "✅ VM $VM_ID stopped successfully"
          else
            echo "⚠️ Failed to stop VM $VM_ID, continuing with rollback"
          fi
          
          # Wait for VM to stop
          echo "Waiting for VM to stop..."
          for i in {1..12}; do
            STATUS=$(secretvm-cli vm status "$VM_ID" --format json | jq -r '.status')
            if [[ "$STATUS" == "stopped" || "$STATUS" == "failed" ]]; then
              echo "✅ VM is stopped"
              break
            fi
            echo "Attempt $i/12: VM status is $STATUS, waiting..."
            sleep 5
          done

      - name: Restore Previous VM (if available)
        if: needs.validate-rollback.outputs.previous_vm_available == 'true'
        run: |
          echo "🔄 Restoring previous VM..."
          
          PREVIOUS_VM_ID="${{ github.event.inputs.previous_vm_id }}"
          
          # Start previous VM
          if secretvm-cli vm start "$PREVIOUS_VM_ID"; then
            echo "✅ Previous VM $PREVIOUS_VM_ID started successfully"
            
            # Wait for VM to be ready
            echo "Waiting for VM to be ready..."
            for i in {1..20}; do
              STATUS=$(secretvm-cli vm status "$PREVIOUS_VM_ID" --format json | jq -r '.status')
              if [[ "$STATUS" == "running" ]]; then
                echo "✅ Previous VM is running"
                break
              fi
              echo "Attempt $i/20: VM status is $STATUS, waiting..."
              sleep 15
            done
            
            # Get VM URL
            VM_URL=$(secretvm-cli vm status "$PREVIOUS_VM_ID" --format json | jq -r '.url')
            echo "Previous VM URL: $VM_URL"
            
            # Test application health
            echo "Testing application health..."
            for i in {1..10}; do
              if curl -f -s "${VM_URL}:8000/health" > /dev/null; then
                echo "✅ Previous VM application is healthy"
                break
              fi
              echo "Attempt $i/10: Application not ready, waiting..."
              sleep 10
            done
            
          else
            echo "❌ Failed to start previous VM $PREVIOUS_VM_ID"
            exit 1
          fi

      - name: Deploy New VM (if no previous VM)
        if: needs.validate-rollback.outputs.previous_vm_available == 'false'
        run: |
          echo "🚀 Deploying new VM as rollback..."
          
          # Prepare environment for emergency deployment
          cat > .env.production << EOF
          SECRET_AI_API_KEY=${{ secrets.SECRET_AI_API_KEY }}
          ARWEAVE_WALLET_JWK=${{ secrets.ARWEAVE_WALLET_JWK }}
          DEPLOYMENT_ENVIRONMENT=production
          SECRETVM_DEPLOYMENT=true
          APP_DEBUG=false
          LOG_LEVEL=WARNING
          APP_HOST=0.0.0.0
          APP_PORT=8000
          CACHE_TTL_SECONDS=300
          SECRET_AI_DISCOVERY_CACHE_TTL=3600
          ARWEAVE_GATEWAY=https://arweave.net
          ENABLE_ARWEAVE_UPLOAD=true
          MOCK_UNFUNDED_TRANSACTIONS=true
          MAX_MEMORY_MB=1024
          MAX_CPU_PERCENT=80
          HEALTH_CHECK_INTERVAL=30
          CORS_ORIGINS=*
          RATE_LIMIT_PER_MINUTE=100
          ENABLE_SECURITY_HEADERS=true
          EOF
          
          # Set deployment variables
          export VM_NAME="attest-ai-rollback-${{ github.run_number }}"
          export VM_TYPE="medium"
          export ENV_FILE=".env.production"
          
          # Make deployment script executable
          chmod +x scripts/deploy_secretvm.sh
          
          # Deploy new VM
          if ./scripts/deploy_secretvm.sh; then
            echo "✅ Emergency deployment successful"
            
            # Store new VM info
            VM_ID=$(cat .vm_id 2>/dev/null)
            VM_URL=$(cat .vm_url 2>/dev/null)
            echo "Emergency VM ID: $VM_ID"
            echo "Emergency VM URL: $VM_URL"
            
          else
            echo "❌ Emergency deployment failed"
            exit 1
          fi

      - name: Cleanup Failed VM
        if: github.event.inputs.cleanup_failed_vm == 'true'
        run: |
          echo "🧹 Cleaning up failed VM..."
          
          VM_ID="${{ github.event.inputs.vm_id }}"
          
          # Delete the failed VM
          if secretvm-cli vm delete "$VM_ID" --force; then
            echo "✅ Failed VM $VM_ID deleted successfully"
          else
            echo "⚠️ Failed to delete VM $VM_ID - manual cleanup may be required"
          fi

      - name: Validate Rollback Success
        run: |
          echo "✅ Validating rollback success..."
          
          # Determine which VM to test
          if [[ "${{ needs.validate-rollback.outputs.previous_vm_available }}" == "true" ]]; then
            VM_ID="${{ github.event.inputs.previous_vm_id }}"
            echo "Testing restored VM: $VM_ID"
          else
            VM_ID=$(cat .vm_id 2>/dev/null)
            echo "Testing emergency VM: $VM_ID"
          fi
          
          # Get VM status and URL
          VM_STATUS=$(secretvm-cli vm status "$VM_ID" --format json)
          VM_URL=$(echo "$VM_STATUS" | jq -r '.url')
          VM_STATE=$(echo "$VM_STATUS" | jq -r '.status')
          
          echo "VM State: $VM_STATE"
          echo "VM URL: $VM_URL"
          
          if [[ "$VM_STATE" == "running" ]]; then
            echo "✅ VM is running"
            
            # Test application health
            if curl -f -s "${VM_URL}:8000/health" > /dev/null; then
              echo "✅ Application health check passed"
              
              # Get health details
              HEALTH=$(curl -s "${VM_URL}:8000/health")
              echo "Health Status: $(echo "$HEALTH" | jq -r '.status')"
              
              # Test self-attestation
              if curl -f -s "${VM_URL}:8000/api/attestation/self" > /dev/null; then
                echo "✅ Self-attestation endpoint accessible"
              else
                echo "⚠️ Self-attestation endpoint not accessible"
              fi
              
            else
              echo "❌ Application health check failed"
              exit 1
            fi
          else
            echo "❌ VM is not running: $VM_STATE"
            exit 1
          fi

      - name: Create Rollback Report
        if: always()
        run: |
          echo "📋 Creating rollback report..."
          
          cat > rollback_report.md << EOF
          # Rollback Report
          
          ## Rollback Information
          - **Rollback Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Initiated By**: ${{ github.actor }}
          - **Reason**: ${{ github.event.inputs.rollback_reason }}
          - **Failed VM ID**: ${{ github.event.inputs.vm_id }}
          - **Previous VM ID**: ${{ github.event.inputs.previous_vm_id }}
          
          ## Actions Taken
          - **Failed VM Status**: ${{ needs.validate-rollback.outputs.vm_status }}
          - **Previous VM Available**: ${{ needs.validate-rollback.outputs.previous_vm_available }}
          - **Cleanup Failed VM**: ${{ github.event.inputs.cleanup_failed_vm }}
          
          ## Results
          - **Rollback Status**: ${{ job.status }}
          - **New VM Running**: $(if [[ -f .vm_id ]]; then echo "Yes ($(cat .vm_id))"; else echo "Previous VM Restored"; fi)
          
          ## Post-Rollback Actions Required
          1. Verify application functionality
          2. Update DNS/load balancer if needed
          3. Investigate root cause of failure
          4. Update monitoring and alerting
          5. Document lessons learned
          
          ## Monitoring
          $(if [[ "${{ needs.validate-rollback.outputs.previous_vm_available }}" == "true" ]]; then
            echo "- Previous VM URL: Use secretvm-cli vm status ${{ github.event.inputs.previous_vm_id }}"
          else
            echo "- New VM URL: $(cat .vm_url 2>/dev/null)"
          fi)
          EOF
          
          echo "✅ Rollback report created"

      - name: Upload Rollback Artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: rollback-artifacts-${{ github.run_id }}
          path: |
            rollback_report.md
            pre_rollback_*.json
            pre_rollback_*.txt
            .vm_id
            .vm_url

  # Job 3: Post-Rollback Validation
  post-rollback-validation:
    name: Post-Rollback Validation
    runs-on: ubuntu-latest
    needs: [validate-rollback, emergency-rollback]
    if: needs.emergency-rollback.result == 'success'
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx asyncio pydantic psutil

      - name: Install SecretVM CLI
        run: |
          curl -sSL https://get.scrt.network/secretvm-cli | bash
          export PATH="$HOME/.secretvm/bin:$PATH"
          echo "$HOME/.secretvm/bin" >> $GITHUB_PATH

      - name: Setup SecretVM Authentication
        run: |
          secretvm-cli auth login -w "${{ secrets.SECRETVM_WALLET_ADDRESS }}"

      - name: Download Rollback Artifacts
        uses: actions/download-artifact@v3
        with:
          name: rollback-artifacts-${{ github.run_id }}
          path: artifacts

      - name: Determine VM to Validate
        id: vm_info
        run: |
          echo "🔍 Determining VM to validate..."
          
          if [[ "${{ needs.validate-rollback.outputs.previous_vm_available }}" == "true" ]]; then
            VM_ID="${{ github.event.inputs.previous_vm_id }}"
            echo "Validating restored VM: $VM_ID"
          else
            VM_ID=$(cat artifacts/.vm_id 2>/dev/null || echo "unknown")
            echo "Validating emergency VM: $VM_ID"
          fi
          
          if [[ "$VM_ID" != "unknown" ]]; then
            VM_URL=$(secretvm-cli vm status "$VM_ID" --format json | jq -r '.url')
            echo "vm_id=$VM_ID" >> $GITHUB_OUTPUT
            echo "vm_url=$VM_URL" >> $GITHUB_OUTPUT
          else
            echo "❌ Could not determine VM to validate"
            exit 1
          fi

      - name: Quick Health Validation
        run: |
          echo "🏥 Running quick health validation..."
          
          VM_URL="${{ steps.vm_info.outputs.vm_url }}"
          
          # Basic health check
          if curl -f -s "${VM_URL}:8000/health" > /dev/null; then
            echo "✅ Health check passed"
            
            # Get health details
            HEALTH=$(curl -s "${VM_URL}:8000/health")
            echo "Health Response: $HEALTH"
            
            STATUS=$(echo "$HEALTH" | jq -r '.status')
            if [[ "$STATUS" == "healthy" ]]; then
              echo "✅ Application status is healthy"
            else
              echo "⚠️ Application status: $STATUS"
            fi
          else
            echo "❌ Health check failed"
            exit 1
          fi

      - name: Basic Functionality Test
        run: |
          echo "🧪 Running basic functionality test..."
          
          VM_URL="${{ steps.vm_info.outputs.vm_url }}"
          
          # Test self-attestation
          if curl -f -s "${VM_URL}:8000/api/attestation/self" > /dev/null; then
            echo "✅ Self-attestation endpoint working"
          else
            echo "⚠️ Self-attestation endpoint not accessible"
          fi
          
          # Test environment info
          if curl -f -s "${VM_URL}:8000/api/environment/info" > /dev/null; then
            echo "✅ Environment info endpoint working"
          else
            echo "⚠️ Environment info endpoint not accessible"
          fi
          
          echo "✅ Basic functionality test completed"

      - name: Create Final Rollback Summary
        run: |
          echo "📊 Creating final rollback summary..."
          
          VM_ID="${{ steps.vm_info.outputs.vm_id }}"
          VM_URL="${{ steps.vm_info.outputs.vm_url }}"
          
          cat > final_rollback_summary.md << EOF
          # Rollback Completed Successfully ✅
          
          ## Summary
          - **Rollback Time**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          - **Reason**: ${{ github.event.inputs.rollback_reason }}
          - **Method**: ${{ needs.validate-rollback.outputs.previous_vm_available == 'true' && 'Previous VM Restored' || 'Emergency Deployment' }}
          - **Status**: SUCCESS
          
          ## Active VM
          - **VM ID**: $VM_ID
          - **VM URL**: $VM_URL
          - **Application URL**: ${VM_URL}:8000
          - **Health Status**: ✅ Healthy
          
          ## Quick Access
          - [Health Check](${VM_URL}:8000/health)
          - [Environment Info](${VM_URL}:8000/api/environment/info)
          - [Self-Attestation](${VM_URL}:8000/api/attestation/self)
          
          ## Next Steps
          1. ✅ Rollback completed successfully
          2. ⏳ Verify all application functionality
          3. ⏳ Update monitoring and alerting
          4. ⏳ Investigate root cause of original failure
          5. ⏳ Plan preventive measures
          
          ## Management Commands
          \`\`\`bash
          # Check VM status
          secretvm-cli vm status $VM_ID
          
          # View logs
          secretvm-cli vm logs $VM_ID
          
          # Monitor health
          python3 scripts/monitor_secretvm_deployment.py --vm-url $VM_URL
          \`\`\`
          EOF
          
          echo "✅ Final rollback summary created"

      - name: Upload Final Summary
        uses: actions/upload-artifact@v3
        with:
          name: final-rollback-summary-${{ github.run_id }}
          path: final_rollback_summary.md